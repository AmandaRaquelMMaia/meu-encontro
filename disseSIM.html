<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programar</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/script.js" defer></script>
</head>
<body>

    <div class="cupidoAnimada"></div>

    <div class="opcoes-grupo">
        <h1>O que gostaria de fazer?</h1>
        <form id="meuForm">

            <div class="cards-container">
                <label>
                    <input type="radio" id="restaurante" name="escolha_unica" value="restaurante" class="opcao-input" required>
                    <div class="imagem-local-grupo">
                        <img src="../img/restaurante.webp" alt="Restaurante" class="opcao-imagem">                      
                        <span class="opcao-palavra">Restaurante</span>
                    </div>
                </label>

                </label>

                <label>
                    <input type="radio" id="praca" name="escolha_unica" value="praca" class="opcao-input" required>
                    <div class="imagem-local-grupo">
                            <img src="../img/praça.jpg" alt="praca" class="opcao-imagem">                      
                            <span class="opcao-palavra">Praça</span>
                    </div>
                </label>

                <label>
                    <input type="radio" id="cinema/shopping" name="escolha_unica" value="cinema/shopping" class="opcao-input" required>
                    <div class="imagem-local-grupo">
                            <img src="../img/cinema.jpg" alt="cinema/shopping" class="opcao-imagem">                     
                            <span class="opcao-palavra">Cinema shopping</span>
                    </div>
                </label>

                <label>
                    <input type="radio" id="feira" name="escolha_unica" value="feira" class="opcao-input" required>
                        <div class="imagem-local-grupo">
                            <img src="../img/feira.jpg" alt="feira" class="opcao-imagem">
                            <span class="opcao-palavra">Feira</span>
                        </div>
                </label>
            </div>
                <button type="submit" class="botao-proximo">Avançar</button>
                <button type="button" onclick="window.location.href='index.html'">Voltar</button>

        </form>
    </div>

</body>
</html>
